name: 🍏 Apple X — Daily Key Generator

on:
  schedule:
    - cron: '0 0 * * *'
    - cron: '15,45 * * * *'
  workflow_dispatch:
    inputs:
      mode:
        description: 'Action to perform'
        required: true
        default: 'generate'
        type: choice
        options:
          - generate        # New key + update embed
          - refresh         # Refresh embed only (keep current key)
          - new-embed       # Send a new message, delete the old one, save new ID
          - encrypt-current # 🔒 ONLY encrypts the current key.txt (No Discord update)

permissions:
  contents: write

jobs:
  generate-key:
    name: Generate & Broadcast Daily Key
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Detect mode from schedule
        id: detect-mode
        run: |
          if [ "${{ github.event_name }}" = "schedule" ]; then
            HOUR=$(date -u +"%H")
            MINUTE=$(date -u +"%M")
            if [ "$HOUR" = "00" ] && [ "$MINUTE" = "00" ]; then
              echo "mode=generate" >> $GITHUB_OUTPUT
            else
              echo "mode=refresh" >> $GITHUB_OUTPUT
            fi
          else
            echo "mode=${{ github.event.inputs.mode || 'generate' }}" >> $GITHUB_OUTPUT
          fi

      - name: Generate Key & Edit Discord Embed
        env:
          WEBHOOK_URL: ${{ secrets.WEBHOOK_URL }}
          MODE: ${{ steps.detect-mode.outputs.mode }}
        run: |
          python3 << 'EOF'
          import random
          import string
          import requests
          import os
          import sys
          import base64
          from datetime import datetime, timezone, timedelta

          mode = os.environ.get("MODE", "generate")
          print(f"▶️  Mode: {mode}")

          # ── SECRET PASSWORD
