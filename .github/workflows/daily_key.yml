          CHARSET = string.ascii_uppercase + string.digits

          def encrypt_xor(text, key):
              return bytes([ord(c) ^ ord(key[i % len(key)]) for i, c in enumerate(text)])

          def decrypt_xor(data_bytes, key):
              return "".join([chr(b ^ ord(key[i % len(key)])) for i, b in enumerate(data_bytes)])

          # ── MODE : ENCRYPT CURRENT
          if mode == "encrypt-current":
              try:
                  with open("key.txt", "r") as f:
                      content = f.read().strip()
                  
                  if content.startswith("APPLEX"):
                      xor_encrypted = encrypt_xor(content, SECRET_PASSWORD)
                      obfuscated_key = base64.b64encode(xor_encrypted).decode('utf-8')
                      with open("key.txt", "w") as f:
                          f.write(obfuscated_key)
                      print("✅ Fichier key.txt obfusqué avec succès ! (Discord ignoré)")
                  else:
                      print("⚠️ Le fichier ne commence pas par APPLEX. Déjà crypté ?")
              except FileNotFoundError:
                  print("❌ key.txt introuvable.")
              
              sys.exit(0)

          # ── AUTRES MODES : REFRESH OU GENERATE
          if mode == "refresh" or mode == "new-embed":
              try:
                  with open("key.txt", "r") as f:
                      obfuscated_key = f.read().strip()
                  
                  try:
                      xor_bytes = base64.b64decode(obfuscated_key)
                      test_key = decrypt_xor(xor_bytes, SECRET_PASSWORD)
                      if test_key.startswith("APPLEX"):
                          daily_key = test_key
                      else:
                          daily_key = obfuscated_key
                  except Exception:
                      daily_key = obfuscated_key
                      
              except FileNotFoundError:
                  print("❌ key.txt not found.", file=sys.stderr)
                  sys.exit(1)
          else:
              random_part = ''.join(random.SystemRandom().choices(CHARSET, k=13))
              daily_key = f"APPLEX{random_part}"
              
              xor_encrypted = encrypt_xor(daily_key, SECRET_PASSWORD)
              obfuscated_key = base64.b64encode(xor_encrypted).decode('utf-8')
              
              with open("key.txt", "w") as f:
                  f.write(obfuscated_key)
              print(f"✅ New key generated & encrypted in file")

          # ── UTC timestamps & Discord ──────────────────────────────────
          now_utc = datetime.now(timezone.utc)
          time_str = now_utc.strftime("%H:%M UTC")

          next_midnight = (now_utc + timedelta(days=1)).replace(hour=0, minute=0, second=0, microsecond=0)
          expire_str = next_midnight.strftime("%B %d, %Y at 00:00 UTC")
          hours_left = int((next_midnight - now_utc).total_seconds() // 3600)
          mins_left  = int(((next_midnight - now_utc).total_seconds() % 3600) // 60)
          time_left  = f"{hours_left}h {mins_left:02d}m remaining"

          webhook_url = os.environ.get("WEBHOOK_URL")
          if not webhook_url:
              sys.exit(1)

          parts = webhook_url.rstrip("/").split("/")
          base_url = f"https://discord.com/api/webhooks/{parts[-2]}/{parts[-1]}"

          message_id = None
          try:
              with open("message_id.txt", "r") as f:
                  message_id = f.read().strip()
          except FileNotFoundError:
              pass

          embed_payload = {
              "username": "Apple X | KEY",
              "embeds": [{
                  "author": {"name": "Apple X — Security System"},
                  "title": "🔑  Daily Access Key",
                  "description": f"-# {now_utc.strftime('%A, %B %d %Y')}\n```fix\n{daily_key}\n```\n-# ⚠️  Do not share this key — Come back daily to keep your access.",
                  "color": 0x57F287,
                  "fields": [
                      {"name": "📅  Expires on", "value": f"**{expire_str}**", "inline": True},
                      {"name": "⏳  Time left", "value": f"**{time_left}**", "inline": True}
                  ],
                  "footer": {"text": f"{'Refreshed' if mode == 'refresh' else 'Generated'} at {time_str}  ·  Apple X"}
              }]
          }

          if mode == "new-embed" or message_id is None:
              resp = requests.post(f"{base_url}?wait=true", json=embed_payload, timeout=10)
              resp.raise_for_status()
              new_message_id = str(resp.json()["id"])
              if message_id:
                  requests.delete(f"{base_url}/messages/{message_id}", timeout=10)
              with open("message_id.txt", "w") as f:
                  f.write(new_message_id)
          else:
              requests.patch(f"{base_url}/messages/{message_id}", json=embed_payload, timeout=10)
          EOF

      - name: Commit & Push changes
        if: ${{ steps.detect-mode.outputs.mode != 'refresh' }}
        run: |
          git config --global user.name "Apple X Bot"
          git config --global user.email "bot@applex.com"
          # On ajoute les fichiers s'ils existent
          if [ -f key.txt ]; then git add key.txt; fi
          if [ -f message_id.txt ]; then git add message_id.txt; fi
          # On vérifie s'il y a quelque chose à commiter
          if ! git diff --cached --quiet; then
            git commit -m "chore: secure daily key update"
            git push
          else
            echo "⚠️ No changes to commit"
          fi
